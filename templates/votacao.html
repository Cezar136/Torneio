<!DOCTYPE html>
<html>
<head>
    <title>Torneio</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .placar {
            margin: 15px;
            font-size: 18px;
        }

        .barra-container {
            width: 60%;
            margin: 10px auto;
            background: #333;
            border-radius: 20px;
            overflow: hidden;
        }

        .barra {
            height: 20px;
            background: #00ff88;
            width: {{ (votos_atual / max_votos) * 100 }}%;
            transition: 0.3s;
        }

        .confronto {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-top: 40px;
        }

        .card {
            background: #1c1c1c;
            padding: 20px;
            border-radius: 20px;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
            background: #292929;
        }

        img {
            width: 250px;
            border-radius: 15px;
        }

        button {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
        }

        .vs {
            font-size: 40px;
            font-weight: bold;
            color: #888;
        }

        .campeao {
            margin-top: 50px;
            font-size: 30px;
            color: gold;
        }
    </style>
</head>
<body>

<h1>🔥 Torneio 🔥</h1>

<div class="placar" id="placar">
    Votos: {{ votos_atual }} / {{ max_votos }}
</div>

<div class="barra-container">
    <div class="barra" id="barra"></div>
</div>

{% if not torneio_campeao %}
<form action="/votar" method="post">

    <div class="confronto">

        <button type="submit" name="escolha" value="esquerda">
            <div class="card">
                <img src="{{ url_for('static', filename=confronto.esquerda.imagem) }}">
                <h3>{{ confronto.esquerda.nome }}</h3>
            </div>
        </button>

        <div class="vs">VS</div>

        <button type="submit" name="escolha" value="direita">
            <div class="card">
                <img src="{{ url_for('static', filename=confronto.direita.imagem) }}">
                <h3>{{ confronto.direita.nome }}</h3>
            </div>
        </button>

    </div>

</form>
{% endif %}

{% if torneio_campeao %}
    <div class="campeao">
        🏆 CAMPEÃO: {{ torneio_campeao.nome }} 🏆
    </div>
{% endif %}

<script>
let confrontoAtual = {{ confronto_atual }};

function atualizar() {
    fetch("/status")
        .then(res => res.json())
        .then(data => {

            if (data.campeao) {
                document.body.innerHTML =
                    "<h1>🏆 Campeão: " + data.campeao + "</h1>";
                return;
            }

            document.getElementById("placar").innerText =
                "Votos: " + data.votos_atual + " / " + data.max_votos;

            document.getElementById("barra").style.width =
                (data.votos_atual / data.max_votos * 100) + "%";

            if (data.confronto_atual !== confrontoAtual) {
                location.reload();
            }
        });
}

setInterval(atualizar, 2000);
</script>

</body>
</html>
